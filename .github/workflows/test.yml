name: Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Testing philosophy: no mocks — tests exercise real code and real services.
# The `integration`-marked tests need a live Redis Stack; when none is reachable
# they skip cleanly (see tests/conftest.py), so this workflow stays green while
# still running every pure-logic test.
#
# Integration + e2e tests run against a managed cloud Redis (Stack/RediSearch)
# whose connection string is stored as the `REDIS_URL` GitHub Actions secret
# (Settings > Secrets and variables > Actions). When the secret is absent (e.g.
# forks), REDIS_URL is empty, the tests can't reach Redis, and they skip cleanly.

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    env:
      HF_HOME: ${{ github.workspace }}/hf_cache
      REDIS_URL: ${{ secrets.REDIS_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Embedding model (~80MB) is downloaded by the end-to-end pipeline test
      # once Redis is available; cache it so reruns skip the download.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: hf_cache
          key: ${{ runner.os }}-hf-cache

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,corpus]"

      - name: Run tests
        run: pytest -v --cov=topic_boundaries --cov-report=term-missing

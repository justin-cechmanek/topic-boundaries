name: Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    # Redis Stack (RediSearch + vector) so the `integration` tests run for real,
    # matching the image in docker-compose.yml.
    services:
      redis:
        image: redis/redis-stack-server:7.4.0-v6
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # No REDIS_URL here: code and tests already default to redis://localhost:6379/0
    # (the service mapping below), and setting it would override the config-file
    # precedence exercised by test_config.
    env:
      HF_HOME: ${{ github.workspace }}/hf_cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Embedding model (~80MB) is downloaded by the end-to-end pipeline test;
      # cache it so reruns skip the download.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: hf_cache
          key: ${{ runner.os }}-hf-cache

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,corpus]"

      - name: Run tests
        run: pytest -v --cov=src --cov-report=term-missing

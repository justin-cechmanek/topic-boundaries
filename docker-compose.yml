# Redis Stack (RediSearch + vector indexing) for local runs.
# Usage: docker compose up -d
# The library reads redis_url from config.yml; override with the REDIS_URL env var.

services:
  redis:
    image: redis/redis-stack-server:7.4.0-v6
    ports:
      - "6379:6379"
    volumes:
      - topic-boundaries-redis:/data

volumes:
  topic-boundaries-redis:

# Redis Stack (RediSearch + vector indexing) for local runs.
# Usage: docker compose up -d
# Then:  python find_topics.py ...  (redis_url is read from config.yml; override with REDIS_URL env var)

services:
  redis:
    image: redis/redis-stack-server:7.4.0-v6
    ports:
      - "6379:6379"
    volumes:
      - topic-boundaries-redis:/data

volumes:
  topic-boundaries-redis:
